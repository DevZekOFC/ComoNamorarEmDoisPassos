<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aceita namorar comigo?</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(180deg, #8B0000, #4A0000);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
      position: relative;
      color: white;
    }

    .phone {
      width: 380px;
      max-width: 95%;
      background: #9F0000;
      border-radius: 55px;
      padding: 20px 12px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
      position: relative;
    }

    .screen {
      background: linear-gradient(180deg, #C8102E, #9F0000);
      border-radius: 45px;
      height: 620px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .emoji {
      font-size: 170px;
      margin: 10px 0 15px;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
    }

    h1 {
      font-size: 1.55em;
      margin: 10px 0 35px;
      padding: 0 25px;
      line-height: 1.25;
      text-shadow: 0 3px 10px rgba(0,0,0,0.6);
    }

    .buttons {
      display: flex;
      gap: 25px;
      margin-top: 10px;
    }

    button {
      padding: 16px 38px;
      font-size: 1.35em;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    }

    #sim {
      background: #580732;
      color: white;
    }

    #sim:hover {
      background: #5a0535;
      transform: scale(1.08);
    }

    #nao {
      background: #6B0000;
      color: white;
      position: relative;
    }

    /* Modal Final */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .modal-content {
      background: #1a1a1a;
      padding: 35px 25px;
      border-radius: 20px;
      max-width: 340px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    .modal-content h2 {
      color: #50062d;
      margin: 0 0 15px;
      font-size: 1.6em;
    }

    .modal-content p {
      font-size: 1.25em;
      margin: 15px 0 25px;
      line-height: 1.4;
    }

    .modal-content button {
      background: #4a4a4a;
      color: white;
      padding: 12px 30px;
      font-size: 1.1em;
    }

    .heart {
      position: absolute;
      font-size: 28px;
      opacity: 0.75;
      animation: float 7s infinite linear;
      filter: drop-shadow(0 5px 8px rgba(0,0,0,0.5));
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); }
      100% { transform: translateY(-150px) rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="phone">
    <div class="screen" id="main-screen">
      <!-- Corações -->
      <div class="heart" style="left: 12%; animation-delay: 0s; color: #ddd;">🖤</div>
      <div class="heart" style="left: 28%; animation-delay: 1.5s; color: #bbb;">❤️</div>
      <div class="heart" style="left: 45%; animation-delay: 3s; color: #ddd;">🖤</div>
      <div class="heart" style="left: 65%; animation-delay: 0.8s; color: #bbb;">💔</div>
      <div class="heart" style="left: 78%; animation-delay: 4s; color: #ddd;">❤️</div>
      <div class="heart" style="left: 20%; animation-delay: 5.5s; color: #bbb;">🖤</div>

      <!-- Emoji da foto -->
      <div class="emoji">🤧</div>

      <h1>VOCÊ ACEITARIA NAMORAR COMIGO?</h1>

      <div class="buttons">
        <button id="sim">SIM</button>
        <button id="nao">NÃO</button>
      </div>
    </div>
  </div>

  <!-- Modal Final -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>✨ Valeu bb, meu chuchuzinho kkkkk</h2>
      <p>Manda DM que eu tô te esperando ❤️</p>
      <button onclick="fecharModal()">OK</button>
    </div>
  </div>

  <script>
    const simBtn = document.getElementById('sim');
    const naoBtn = document.getElementById('nao');
    const modal = document.getElementById('modal');

    simBtn.addEventListener('click', () => {
      modal.style.display = 'flex';
    });

    function fecharModal() {
      modal.style.display = 'none';
    }

    function moverNao() {
      const container = document.querySelector('.screen');
      const maxX = container.offsetWidth - 160;
      const maxY = container.offsetHeight - 100;
      
      const x = Math.random() * maxX;
      const y = Math.random() * maxY + 120;

      naoBtn.style.position = 'absolute';
      naoBtn.style.left = x + 'px';
      naoBtn.style.top = y + 'px';
    }

    naoBtn.addEventListener('mouseover', moverNao);
    naoBtn.addEventListener('click', () => {
      moverNao();
    });
  </script>
</body>
</html>
